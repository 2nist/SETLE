name: Windows Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Windows Debug — build + model tests
    runs-on: windows-latest

    steps:
      # -------------------------------------------------------
      # 1. Checkout with submodules
      #    fetch-depth:1 keeps it fast; submodules are the
      #    slow part — recursive is required for JUCE + tracktion
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # -------------------------------------------------------
      # 1b. Patch upstream submodule incompatibilities
      #     tracktion_engine uses juce::Displays::Display::userBounds
      #     which was renamed to totalArea in JUCE 8. The upstream
      #     tracktion_engine repo is not yet updated; patch in CI.
      # -------------------------------------------------------
      - name: Patch upstream submodules for standalone CMake builds
        shell: pwsh
        run: |
          # tracktion_engine: userBounds -> totalArea (JUCE 8 Displays API rename)
          # Arrow member access (->userBounds) so use bare word match, not \.
          $te = "modules/tracktion_engine/modules/tracktion_engine/plugins/tracktion_PluginWindowState.cpp"
          $teContent = Get-Content $te -Raw
          if ($teContent -match '\buserBounds\b') {
              $teContent -replace '\buserBounds\b', 'totalArea' | Set-Content $te -NoNewline
              Write-Host "Patched: userBounds -> totalArea in tracktion_PluginWindowState.cpp"
          } else {
              Write-Host "WARNING: userBounds not found in tracktion_PluginWindowState.cpp — already patched or path wrong"
          }

          # fontaudio: remove Projucer-only AppConfig.h include
          $fa = "modules/fontaudio/wrappers/juce/module/fontaudio/fontaudio.cpp"
          $faContent = Get-Content $fa -Raw
          if ($faContent -match '#include\s+"AppConfig\.h"') {
              $faContent -replace '(?m)^#include\s+"AppConfig\.h"\r?\n', '' | Set-Content $fa -NoNewline
              Write-Host "Patched: removed AppConfig.h from fontaudio.cpp"
          } else {
              Write-Host "WARNING: AppConfig.h not found in fontaudio.cpp — already patched or path wrong"
          }

          # cello: remove Projucer-only JuceHeader.h includes from all cello .cpp files
          $celloPatchCount = 0
          Get-ChildItem "modules/cello/cello" -Filter "*.cpp" | ForEach-Object {
              $c = Get-Content $_.FullName -Raw
              if ($c -match '#include\s+"JuceHeader\.h"') {
                  $c -replace '(?m)^#include\s+"JuceHeader\.h"\r?\n', '' | Set-Content $_.FullName -NoNewline
                  $celloPatchCount++
              }
          }
          Write-Host "Patched: removed JuceHeader.h from $celloPatchCount cello .cpp file(s)"

          # cello_object.cpp needs explicit cello_path.h + cello_query.h after removing JuceHeader.h
          $co = "modules/cello/cello/cello_object.cpp"
          if (Test-Path $co) {
              $c = Get-Content $co -Raw
              if ($c -notmatch '#include "cello_path\.h"') {
                  $c -replace '(#include "cello_object\.h")', "`$1`n#include `"cello_path.h`"`n#include `"cello_query.h`"" | Set-Content $co -NoNewline
              }
          }

      # -------------------------------------------------------
      # 2. Cache the CMake build directory
      #    Keyed on CMakeLists.txt + preset file so cache busts
      #    when either changes. Module hashes omitted to avoid
      #    invalidating on submodule pointer updates.
      # -------------------------------------------------------
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/windows-debug
          key: cmake-win-debug-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            cmake-win-debug-

      # -------------------------------------------------------
      # 3. Configure using the windows-debug CMake preset
      #    Preset sets: VS 17 2022, x64, Debug, all modules ON
      #    SETLE_BUILD_TESTS defaults to ON in CMakeLists.txt
      # -------------------------------------------------------
      - name: Configure (windows-debug preset)
        run: cmake --preset windows-debug
        shell: pwsh

      # -------------------------------------------------------
      # 4. Build app + test binary
      #    Use the windows-debug build preset (matches configure)
      #    --parallel keeps it moving on the 2-core GH runner
      # -------------------------------------------------------
      - name: Build SETLE and setle_model_tests
        run: |
          cmake --build --preset windows-debug `
                --target SETLE setle_model_tests `
                --parallel 2
        shell: pwsh

      # -------------------------------------------------------
      # 5. Run model tests via CTest
      #    Working dir must be the build output directory so
      #    CTest finds the test registration from add_test()
      # -------------------------------------------------------
      - name: Run model tests
        working-directory: build/windows-debug
        run: ctest --build-config Debug -V --output-on-failure -R setle_model_tests
        shell: pwsh

      # -------------------------------------------------------
      # 6. Upload test logs on failure
      # -------------------------------------------------------
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: |
            build/windows-debug/Testing/Temporary/LastTest.log
            build/windows-debug/Testing/Temporary/LastTestsFailed.log
          retention-days: 7
